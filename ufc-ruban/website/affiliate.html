<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Dashboard — UFC RUBAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #08080A;
            --red: #E8002A;
            --text: #F2F2F4;
            --muted: #7A7A88;
            --green: #00E676;
            --border: rgba(242, 242, 244, 0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2rem;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .commission-badge {
            display: inline-block;
            background: var(--red);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 1rem;
            border-radius: 2px;
        }

        .login-section {
            background: rgba(242, 242, 244, 0.02);
            border: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: var(--muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            font-family: 'DM Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--red);
        }

        button {
            background: var(--red);
            color: var(--text);
            border: none;
            padding: 0.75rem 2rem;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(242, 242, 244, 0.02);
            border: 1px solid var(--border);
            padding: 1.5rem;
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .stat-value {
            font-family: 'DM Mono', monospace;
            font-size: 2rem;
            font-weight: 500;
        }

        .stat-value.green {
            color: var(--green);
        }

        .referral-link-section {
            background: rgba(242, 242, 244, 0.02);
            border: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .link-display {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .link-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
        }

        .copy-btn {
            padding: 0.75rem 1.5rem;
            white-space: nowrap;
        }

        .events-section {
            background: rgba(242, 242, 244, 0.02);
            border: 1px solid var(--border);
            padding: 2rem;
        }

        .events-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .events-table th {
            text-align: left;
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .events-table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
        }

        .events-table tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            font-size: 0.7rem;
            border-radius: 2px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        .badge.conversion {
            background: var(--green);
            color: var(--bg);
        }

        .badge.click {
            background: var(--muted);
            color: var(--bg);
        }

        .error {
            color: var(--red);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error.active {
            display: block;
        }

        .affiliate-info {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .affiliate-name {
            font-weight: 600;
            color: var(--text);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .link-display {
                flex-direction: column;
            }

            .events-table {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AFFILIATE DASHBOARD</h1>
            <p class="subtitle">UFC RUBAN — Premium Fight Predictions</p>
            <div class="commission-badge">20% RECURRING COMMISSION</div>
        </div>

        <div class="login-section" id="loginSection">
            <div class="form-group">
                <label for="referralCode">Enter Your Referral Code</label>
                <input type="text" id="referralCode" placeholder="Enter code..." />
                <div class="error" id="errorMessage"></div>
            </div>
            <button id="loginBtn">LOAD DASHBOARD</button>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="affiliate-info" id="affiliateInfo">
                <span class="affiliate-name" id="affiliateName"></span> • <span id="affiliateEmail"></span>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Clicks</div>
                    <div class="stat-value" id="statClicks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Conversions</div>
                    <div class="stat-value" id="statConversions">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Earned</div>
                    <div class="stat-value green" id="statEarned">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending Payout</div>
                    <div class="stat-value green" id="statPending">$0.00</div>
                </div>
            </div>

            <div class="referral-link-section">
                <div class="section-title">YOUR REFERRAL LINK</div>
                <div class="link-display">
                    <input type="text" class="link-input" id="referralLink" readonly />
                    <button class="copy-btn" id="copyBtn">COPY LINK</button>
                </div>
            </div>

            <div class="events-section">
                <div class="section-title">RECENT ACTIVITY</div>
                <table class="events-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Event</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTableBody">
                        <tr>
                            <td colspan="3" style="text-align: center; color: var(--muted);">No activity yet</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button class="logout-btn" id="logoutBtn">LOGOUT</button>
        </div>
    </div>

    <script>
        const loginSection = document.getElementById('loginSection');
        const dashboard = document.getElementById('dashboard');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const referralCodeInput = document.getElementById('referralCode');
        const errorMessage = document.getElementById('errorMessage');
        const copyBtn = document.getElementById('copyBtn');

        let currentCode = null;

        loginBtn.addEventListener('click', loadDashboard);
        referralCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadDashboard();
        });

        logoutBtn.addEventListener('click', () => {
            currentCode = null;
            loginSection.style.display = 'block';
            dashboard.classList.remove('active');
            referralCodeInput.value = '';
            errorMessage.classList.remove('active');
        });

        copyBtn.addEventListener('click', () => {
            const linkInput = document.getElementById('referralLink');
            linkInput.select();
            document.execCommand('copy');
            
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'COPIED!';
            setTimeout(() => {
                copyBtn.textContent = originalText;
            }, 2000);
        });

        async function loadDashboard() {
            const code = referralCodeInput.value.trim();
            if (!code) {
                showError('Please enter a referral code');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'LOADING...';
            errorMessage.classList.remove('active');

            try {
                const response = await fetch(`/api/referral/stats/${code}`);
                
                if (!response.ok) {
                    throw new Error('Invalid referral code');
                }

                const data = await response.json();
                currentCode = code;
                
                // Populate affiliate info
                document.getElementById('affiliateName').textContent = data.name || 'Affiliate';
                document.getElementById('affiliateEmail').textContent = data.email || '';

                // Populate stats
                document.getElementById('statClicks').textContent = data.clicks || 0;
                document.getElementById('statConversions').textContent = data.conversions || 0;
                document.getElementById('statEarned').textContent = formatCurrency(data.total_earned || 0);
                document.getElementById('statPending').textContent = formatCurrency(data.pending_payout || 0);

                // Set referral link
                const referralLink = `${window.location.origin}/?ref=${code}`;
                document.getElementById('referralLink').value = referralLink;

                // Populate events table
                populateEvents(data.recent_events || []);

                // Show dashboard
                loginSection.style.display = 'none';
                dashboard.classList.add('active');

            } catch (error) {
                showError(error.message || 'Failed to load dashboard');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'LOAD DASHBOARD';
            }
        }

        function populateEvents(events) {
            const tbody = document.getElementById('eventsTableBody');
            
            if (!events || events.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--muted);">No activity yet</td></tr>';
                return;
            }

            tbody.innerHTML = events.map(event => `
                <tr>
                    <td>${formatDate(event.created_at || event.date)}</td>
                    <td>
                        <span class="badge ${event.type === 'conversion' ? 'conversion' : 'click'}">
                            ${event.type ? event.type.toUpperCase() : 'EVENT'}
                        </span>
                    </td>
                    <td>${event.amount ? formatCurrency(event.amount) : '—'}</td>
                </tr>
            `).join('');
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2
            }).format(amount);
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            const date = new Date(dateString);
            return new Intl.DateTimeFormat('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }).format(date);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
        }
    </script>
</body>
</html>
